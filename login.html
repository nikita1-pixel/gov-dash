<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access - Political Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 30px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Important for padding */
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #2c3e50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #34495e; }
        .error-message { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Secure Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Access Dashboard</button>
        <p id="errorMessage" class="error-message">Invalid credentials. Please try again.</p>
    </form>
</div>

<script>
    // SIMULATION ONLY for Sprint 1. Real authentication happens on the backend.
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent actual form submission
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Simple hardcoded check for testing layout transition
        if (user === "admin" && pass === "password123") {
            // In a real app, the server sends a secure token, 
            // which we store (e.g., in HttpOnly cookie).
            alert("Login successful (Simulation). Redirecting...");
            window.location.href = 'dashboard.html'; 
        } else {
            document.getElementById('errorMessage').style.display = 'block';
        }
    });
</script>

</body>
</html>
